name: nasdaq-100-daily-screener

on:
  schedule:
    - cron: "20 13 * * 1-5"
  workflow_dispatch: {}

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas numpy scipy requests lxml python-dotenv

      - name: Run daily screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SRC=$(find . -name run_daily.py -not -path "./.git/*" | head -1)
          if [ -z "$SRC" ]; then echo "ERROR: no aparece run_daily.py"; ls -R .; exit 1; fi
          SRCDIR=$(dirname "$SRC")
          echo "Archivos del motor en: $SRCDIR"
          if [ "$(basename "$SRCDIR")" = "nasdaq_screener" ]; then
            cd "$(dirname "$SRCDIR")"
          else
            mkdir -p /tmp/app/nasdaq_screener
            cp "$SRCDIR"/*.py /tmp/app/nasdaq_screener/
            cd /tmp/app
          fi
          python -m nasdaq_screener.run_daily
