name: nasdaq-100-daily-screener

on:
  schedule:
    - cron: "20 13 * * 1-5"
  workflow_dispatch: {}

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas numpy scipy requests lxml python-dotenv

      - name: Run daily screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m nasdaq_screener.run_daily
